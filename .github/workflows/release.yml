name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            ext: ""
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare archive
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/populatrs${{ matrix.ext }}"
          ARCHIVE_NAME="populatrs${{ matrix.ext }}"
          cp "$BIN" "$ARCHIVE_NAME"
          PKG="populatrs-${{ matrix.target }}"
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar czf "$PKG.tar.gz" "$ARCHIVE_NAME"
            echo "ARTIFACT=$PKG.tar.gz" >> $GITHUB_ENV
          else
            7z a "$PKG.zip" "$ARCHIVE_NAME"
            echo "ARTIFACT=$PKG.zip" >> $GITHUB_ENV
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: populatrs-${{ matrix.target }}
          path: ${{ env.ARTIFACT }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: populatrs-*
          merge-multiple: true
      - name: Generate release body
        run: |
          cat > notes.md <<'EOF'
          ## populatrs

          ### Downloads

          | Architecture | File |
          |---|---|
          EOF
          for f in *.*; do
            [[ "$f" == *.md ]] && continue
            [[ "$f" == *.txt ]] && continue
            [ -f "$f" ] || continue
            arch=$(echo "$f" | sed 's/^populatrs-//; s/\.tar\.gz$//; s/\.zip$//')
            echo "| \`$arch\` | \`$f\` |" >> notes.md
          done
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: populatrs ${{ github.ref_name }}
          body_path: notes.md
          files: |
            *.tar.gz
            *.zip
          generate_release_notes: true